server:
  port: 8089

spring:
  config:
    import: "optional:configserver:"
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  data:
    mongodb:
      host: localhost
      port: 27017
      database: jellystudy_evaluation
  application:
    name: jelly-study-evaluation

ai:
  deepseek:
    api-key: sk-d213e134c21742009b70ad74189d7340
    base-url: https://api.deepseek.com
    model: deepseek-chat

dubbo:
  application:
    name: jelly-study-evaluation
  registry:
    address: nacos://${NACOS_ADDR:host.docker.internal:8848}
  protocol:
    name: dubbo
    port: 20881
  provider:
    timeout: 30000

logging:
  level:
    com.jellystudy: debug
    org.apache.dubbo: info
