server:
  port: 8086

spring:
  config:
    import: "optional:configserver:"
  data:
    mongodb:
      host: localhost
      port: 27017
      database: jellystudy
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
  application:
    name: jelly-study
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  zipkin:
    base-url: http://localhost:9411
  sleuth:
    sampler:
      probability: 1.0

ai:
  deepseek:
    api-key: sk-d213e134c21742009b70ad74189d7340
    base-url: https://api.deepseek.com
    model: deepseek-chat

evaluation:
  service:
    url: ${EVALUATION_SERVICE_URL:http://host.docker.internal:8089}

app:
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}

dubbo:
  application:
    name: jelly-study
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: 20880
  consumer:
    timeout: 30000

logging:
  level:
    com.jellystudy: debug
    org.springframework.data.mongodb: debug
    org.apache.dubbo: info
