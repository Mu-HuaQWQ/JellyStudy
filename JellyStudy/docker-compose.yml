services:
  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: jelly-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - jelly-network

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: jelly-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - jelly-network

  # Nacos 注册中心/配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: jelly-nacos
    environment:
      - MODE=standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - jelly-network

  # 主服务实例1
  jelly-study-instance1:
    build:
      context: ./jelly-study
      dockerfile: Dockerfile
    container_name: jelly-study-1
    ports:
      - "8086:8086"
      - "20880:20880"
    environment:
      - SPRING_DATA_MONGODB_HOST=host.docker.internal
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
      - EVALUATION_SERVICE_URL=http://jelly-study-evaluation:8087
      - APP_UPLOAD_DIR=/uploads
    volumes:
      - ./uploads:/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jelly-network
    depends_on:
      - redis

  # 主服务实例2
  jelly-study-instance2:
    build:
      context: ./jelly-study
      dockerfile: Dockerfile
    container_name: jelly-study-2
    ports:
      - "8087:8086"
      - "20881:20880"
    environment:
      - SPRING_DATA_MONGODB_HOST=host.docker.internal
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
      - EVALUATION_SERVICE_URL=http://jelly-study-evaluation:8087
      - APP_UPLOAD_DIR=/uploads
    volumes:
      - ./uploads:/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jelly-network
    depends_on:
      - redis

  # 评估服务
  jelly-study-evaluation:
    build:
      context: ./jelly-study-evaluation
      dockerfile: Dockerfile
    container_name: jelly-study-evaluation
    ports:
      - "8089:8089"
      - "20882:20881"
    environment:
      - SPRING_DATA_MONGODB_HOST=host.docker.internal
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
      - DUBBO_REGISTRY_ADDRESS=nacos://nacos:8848
      - NACOS_ADDR=nacos:8848
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jelly-network

  # 前端页面
  qianduan:
    build:
      context: ../qianduan
      dockerfile: Dockerfile
    container_name: jelly-qianduan
    ports:
      - "8088:80"
    networks:
      - jelly-network

networks:
  jelly-network:
    driver: bridge
